<!DOCTYPE html>
<html>
<head>
<style> 
h1 {
  color: #d00b0b;
}
div {
  width: 100px;
  height: 100px;
  background-color: green;
  animation-name: myAnimation;
  animation-duration: 4s;
}

p {
	text-transform: lowercase;
    animation-name:pAnimation;
    animation-duration: 3s;
    }

@keyframes pAnimation {
	from {text-transform: lowercase;}
    to {text-transform:uppercase;}	
}
@keyframes myAnimation {
  from {background-color: green;width:100px;height: 100px;border-radius: 15px;}
  to {background-color: yellow;width:200px;height: 200px;border-radius: 100px;}
}
</style>
</head>
<body>

<h1>CSS Animation Felix ist toll</h1>
<h1 style="color: blueviolet;">lol</h1>

<div></div>

<p><b>Note:</b> When an animation is finished, it goes back to its original style.</p>

</body>
</html>
